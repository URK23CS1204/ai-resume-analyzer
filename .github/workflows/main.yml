name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: |
        cd backend
        npm install

    - name: Run Tests
      run: |
        echo "Running tests..."
        echo "No tests yet"

    - name: Build Docker Image
      run: |
        cd backend
        docker build -t resume-analyzer-backend .

    - name: Deploy Step
      run: |
        echo "Deploying application..."