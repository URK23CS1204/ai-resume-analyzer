<!doctype html>
<html>
  <head>
    <title>AI Resume Analyzer</title>

    <style>
      body {
        font-family: Arial;
        background: linear-gradient(to right, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 450px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      textarea {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
      }

      button {
        padding: 10px 20px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background: #5a67d8;
      }

      .result {
        margin-top: 20px;
        text-align: left;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>📄 AI Resume Analyzer</h2>

      <textarea
        id="resume"
        rows="8"
        placeholder="Paste your resume text here..."
      ></textarea>

      <button onclick="analyze()">Analyze Resume Now</button>

      <div class="result">
        <h3>🧠 Skills:</h3>
        <p id="skills"></p>

        <h3>💼 Jobs:</h3>
        <p id="jobs"></p>

        <h3>⚡ Suggestions:</h3>
        <p id="suggestions"></p>
      </div>
    </div>

    <script>
      async function analyze() {
        const text = document.getElementById("resume").value;

        if (!text) {
          alert("Please paste your resume");
          return;
        }

        const res = await fetch("http://localhost:3000/analyze", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();

        document.getElementById("skills").innerText = data.skills.join(", ");
        document.getElementById("jobs").innerText = data.jobs.join(", ");
        document.getElementById("suggestions").innerText =
          data.suggestions.join(", ");
      }
    </script>
  </body>
</html>
