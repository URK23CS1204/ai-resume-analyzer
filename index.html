<!doctype html>
<html>
  <head>
    <title>AI Resume Analyzer</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        width: 450px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      h2 {
        margin-bottom: 20px;
        color: #333;
      }

      textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
        resize: none;
      }

      button {
        padding: 10px 25px;
        background: #4facfe;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      }

      button:hover {
        background: #00c6ff;
      }

      .result {
        margin-top: 20px;
        text-align: left;
      }

      .result h3 {
        margin-bottom: 5px;
        color: #444;
      }

      p {
        margin: 5px 0 10px;
        color: #555;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>📄 AI Resume Analyzer</h2>

      <textarea
        id="resume"
        placeholder="Paste your resume text here..."
      ></textarea>

      <button onclick="analyze()">Analyze Resume</button>

      <div class="result">
        <h3>🧠 Skills:</h3>
        <p id="skills"></p>

        <h3>💼 Job Suggestions:</h3>
        <p id="jobs"></p>

        <h3>⚡ Improvements:</h3>
        <p id="suggestions"></p>
      </div>
    </div>

    <script>
      async function analyze() {
        const text = document.getElementById("resume").value;

        if (!text) {
          alert("Please paste your resume text");
          return;
        }

        const res = await fetch("http://localhost:3000/analyze", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();

        document.getElementById("skills").innerText = data.skills.join(", ");
        document.getElementById("jobs").innerText = data.jobs.join(", ");
        document.getElementById("suggestions").innerText =
          data.suggestions.join(", ");
      }
    </script>
  </body>
</html>
